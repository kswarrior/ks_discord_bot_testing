name: Download from HF Bucket and Run Bot testing

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 3: Install the Hugging Face CLI
      - name: Install Hugging Face CLI
        run: |
          pip install -U "huggingface_hub"

      # Step 4: Optimized Sync
      # -v shows exactly what file is downloading in real-time
      # --exclude ignores any pre-existing node_modules folder to save massive amounts of time
      - name: Download discord-bot from HF Bucket
        run: |
          hf buckets sync -v --exclude "node_modules/**" hf://buckets/kswarrior/opencode-storage/discord-bot ./discord-bot

      # Step 5: Install fresh dependencies and start
      - name: Install and Start Discord Bot
        run: |
          cd discord-bot
          npm install
          node .
