name: Download from HF Bucket and Run Bot testing

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 3: Install the Hugging Face CLI
      - name: Install Hugging Face CLI
        run: |
          pip install -U "huggingface_hub"

      # Step 4: Optimized Sync from HF
      - name: Download discord-bot from HF Bucket
        run: |
          hf buckets sync -v --exclude "node_modules/**" hf://buckets/kswarrior/opencode-storage/discord-bot ./discord-bot

      # Step 5: Check GitHub Releases and restore existing tar backup if found
      - name: Restore Data Backup from Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }} # Fixes the "not a git repository" error
        run: |
          mkdir -p discord-bot
          echo "Checking for existing data-backup release..."
          
          # Check if release exists without throwing workflow errors
          if gh release view data-backup >/dev/null 2>&1; then
            echo "Release found! Downloading data.tar.gz..."
            gh release download data-backup --pattern "data.tar.gz" --dir ./ || true
            
            if [ -f "data.tar.gz" ]; then
              echo "Extracting backup into discord-bot/..."
              tar -xzf data.tar.gz -C discord-bot
              rm data.tar.gz
            else
              echo "Backup file asset not found in release. Proceeding fresh."
            fi
          else
            echo "No previous backup release found (First run). Proceeding fresh without erroring."
          fi

      # Step 6: Install, Run with 5h 45m Timeout, Tar and Upload
      - name: Install and Start Discord Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }} # Fixes the "not a git repository" error
        run: |
          cd discord-bot
          npm install
          npm run seed
          
          echo "Launching bot with a 5-hour 45-minute timeout (345 minutes)..."
          timeout 345m npm start || true
          
          echo "Timeout reached or process exited. Preparing backup..."
          cd ..
          
          if [ -d "discord-bot/data" ]; then
            echo "Archiving discord-bot/data..."
            tar -czf data.tar.gz -C discord-bot data
            
            if ! gh release view data-backup >/dev/null 2>&1; then
              echo "Creating new release 'data-backup'..."
              gh release create data-backup data.tar.gz --title "Bot Data Backup" --notes "Automated persistent storage backup."
            else
              echo "Uploading asset to existing 'data-backup' release..."
              gh release upload data-backup data.tar.gz --clobber
            fi
          else
            echo "Error: discord-bot/data directory not found. Skipping backup."
          fi
